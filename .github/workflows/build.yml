name: Build AI Client
on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build portable exe
        run: npx tauri build --no-bundle
      
      - name: Create portable package
        run: |
          mkdir portable
          cp src-tauri/target/release/ai-client.exe portable/
          Compress-Archive -Path portable/* -DestinationPath AI-Client-portable.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Client-portable
          path: AI-Client-portable.zip
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: AI-Client-portable.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
